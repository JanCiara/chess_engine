name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    name: Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run test suite
        run: ctest --test-dir build --output-on-failure 2>&1 | tee test.log

      - name: Publish summary
        if: always()
        run: |
          echo "## Test results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^\[PASS\]|^\[FAIL\]|^benchmark|^all perft|^bench |^wac |Nodes searched|^===========================' test.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  tests-windows:
    name: Tests (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run test suite
        run: ctest --test-dir build -C Release --output-on-failure 2>&1 | Tee-Object -FilePath test.log

      - name: Check results
        run: |
          Select-String -Path test.log -Pattern '\[PASS\] bench completed' -Quiet
          if (-not $?) { exit 1 }
